name: agentci

on:
  pull_request:
  workflow_dispatch:

jobs:
  regression-check:
    name: AgentCI Regression Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install AgentCI
        # Why this step exists:
        # It keeps the workflow close to how a user would run the package locally.
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run AgentCI
        id: agentci_run
        shell: bash
        run: |
          set +e
          agentci run --config agentci.yaml --output-dir .agentci/runs
          exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Render AgentCI PR comment and job summary
        if: always()
        shell: bash
        env:
          AGENTCI_EXIT_CODE: ${{ steps.agentci_run.outputs.exit_code }}
        run: |
          mkdir -p .agentci
          python scripts/render_pr_comment.py \
            --runs-root .agentci/runs \
            --output .agentci/pr-comment.md \
            --exit-code "$AGENTCI_EXIT_CODE" \
            --run-url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          cat .agentci/pr-comment.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload AgentCI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agentci-artifacts
          path: |
            .agentci/runs
            .agentci/pr-comment.md

      - name: Post or update PR comment
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- agentci-report -->";
            const body = marker + "\n" + fs.readFileSync(".agentci/pr-comment.md", "utf8");
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Fail workflow on regression or AgentCI runtime failure
        if: always()
        shell: bash
        env:
          AGENTCI_EXIT_CODE: ${{ steps.agentci_run.outputs.exit_code }}
        run: |
          case "$AGENTCI_EXIT_CODE" in
            0)
              exit 0
              ;;
            1)
              echo "Agent regression detected."
              exit 1
              ;;
            2)
              echo "AgentCI failed due to config, adapter, tooling, or runtime issues. This is not evidence of product regression."
              exit 1
              ;;
            *)
              echo "AgentCI returned an unexpected exit code: $AGENTCI_EXIT_CODE"
              exit 1
              ;;
          esac
